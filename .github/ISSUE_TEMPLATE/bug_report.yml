name: Bug Report
description: Report a bug or unexpected behavior in MacCleaner
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the form below
        as completely as you can — it speeds up triage significantly.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest release of MacCleaner
          required: true

  - type: dropdown
    id: macos-version
    attributes:
      label: macOS version
      description: What version of macOS are you running?
      options:
        - macOS 14 (Sonoma)
        - macOS 15 (Sequoia)
        - macOS 26 (Tahoe)
        - Other (please describe in steps to reproduce)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: MacCleaner version
      description: Found under MacCleaner → About, or in the menu bar tooltip.
      placeholder: e.g. 1.1.0
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A precise list of steps that reliably reproduces the bug.
      placeholder: |
        1. Open MacCleaner
        2. Click "Smart Clean"
        3. Select "Xcode Derived Data"
        4. Click "Clean"
        5. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: |
        Paste any relevant log output. Console.app filtered to "MacCleaner" is a great source.
        Please redact any personal paths if needed.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that might help.
