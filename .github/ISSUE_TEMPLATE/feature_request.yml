name: Feature Request
description: Suggest a new feature or improvement for MacCleaner
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! Please describe the problem first, then propose a solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain point. What is hard or impossible today?
      placeholder: When I try to clean X, I have to do Y manually because…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should MacCleaner solve this? UI, behavior, defaults.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, related issues, prior art (e.g. how CleanMyMac handles it), etc.
