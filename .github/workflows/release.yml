name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build, Sign, Notarize, Publish
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build release (universal arm64 + x86_64)
        run: |
          swift build -c release \
            --arch arm64 --arch x86_64 \
            -Xswiftc -warnings-as-errors

      - name: Stage app bundle
        env:
          APP_NAME: MacCleaner
        run: |
          set -euo pipefail
          BIN_PATH="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/${APP_NAME}"
          STAGE_DIR="${RUNNER_TEMP}/stage"
          BUNDLE_DIR="${STAGE_DIR}/${APP_NAME}.app"
          MACOS_DIR="${BUNDLE_DIR}/Contents/MacOS"
          RES_DIR="${BUNDLE_DIR}/Contents/Resources"
          mkdir -p "${MACOS_DIR}" "${RES_DIR}"
          cp "${BIN_PATH}" "${MACOS_DIR}/${APP_NAME}"
          cp Info.plist "${BUNDLE_DIR}/Contents/Info.plist"
          echo "BUNDLE_DIR=${BUNDLE_DIR}" >> "$GITHUB_ENV"
          echo "STAGE_DIR=${STAGE_DIR}" >> "$GITHUB_ENV"

      # TODO: Code-signing — requires the following GitHub secrets:
